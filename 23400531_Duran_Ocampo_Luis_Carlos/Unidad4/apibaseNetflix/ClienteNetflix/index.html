<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumir API REST · Películas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #14120f;
            --surface: #1f1b16;
            --surface-raised: #262019;
            --text: #f1eae0;
            --muted: #8a8175;
            --gold: #e8b04b;
            --red: #c1443b;
            --line: #3a332a;
            --radius: 4px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            padding: 48px 20px 80px;
            background-image:
                radial-gradient(circle at 12px 12px, rgba(232, 176, 75, 0.06) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        @media (prefers-reduced-motion: no-preference) {
            .marquee, .card, li {
                animation: rise 0.5s ease both;
            }
            .card:nth-of-type(2) { animation-delay: 0.08s; }
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---------- Header / Marquee ---------- */

        .marquee {
            text-align: center;
            margin-bottom: 40px;
        }

        .marquee .eyebrow {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gold);
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            padding: 6px 0;
            width: 100%;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 42px;
            letter-spacing: 0.01em;
            margin: 14px 0 0;
            background: linear-gradient(180deg, #fff6e0 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ---------- Filmstrip-framed card ---------- */

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 28px 32px 28px 40px;
            margin-bottom: 28px;
        }

        .card::before,
        .card::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: 18px;
            background-image: radial-gradient(circle, var(--bg) 3.5px, transparent 3.6px);
            background-size: 18px 20px;
            background-position: center;
            border-right: 1px dashed var(--line);
        }

        .card::after {
            left: auto;
            right: 0;
            border-right: none;
            border-left: 1px dashed var(--line);
            display: none; /* single sprocket rail keeps it restrained */
        }

        h2 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.02em;
            margin: 0 0 4px;
            color: var(--text);
        }

        .section-hint {
            font-size: 12px;
            color: var(--muted);
            margin: 0 0 20px;
        }

        /* ---------- Form ---------- */

        label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin: 16px 0 6px;
        }

        label:first-of-type {
            margin-top: 0;
        }

        input {
            display: block;
            width: 100%;
            padding: 11px 12px;
            background: var(--surface-raised);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
        }

        input::placeholder {
            color: #5c5448;
        }

        input:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 1px;
            border-color: var(--gold);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 16px;
        }

        button {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 13px 20px;
            margin-top: 22px;
            width: 100%;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.12s ease;
        }

        button:hover {
            filter: brightness(1.08);
        }

        button:active {
            transform: scale(0.99);
        }

        button:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 2px;
        }

        #formulario button {
            background: var(--gold);
            color: #1a1400;
        }

        #btnConsultar {
            background: transparent;
            border: 1px solid var(--red);
            color: #ff9a91;
            margin-top: 0;
        }

        #btnConsultar:hover {
            background: rgba(193, 68, 59, 0.12);
        }

        /* ---------- Ticket-stub list ---------- */

        ul {
            list-style: none;
            margin: 20px 0 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        li {
            position: relative;
            background: var(--surface-raised);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 14px 16px;
            font-size: 13px;
            line-height: 1.5;
        }

        li::before {
            content: "";
            position: absolute;
            left: -1px;
            top: 50%;
            width: 10px;
            height: 10px;
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        li::after {
            content: "";
            position: absolute;
            right: -1px;
            top: 50%;
            width: 10px;
            height: 10px;
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 50%;
            transform: translate(50%, -50%);
        }

        ul:empty::before {
            content: "Aún no hay funciones en cartelera. Registra una película o consulta el catálogo.";
            display: block;
            color: var(--muted);
            font-size: 13px;
            padding: 18px 4px;
            text-align: center;
            border: 1px dashed var(--line);
            border-radius: var(--radius);
        }
    </style>
</head>

<body>

    <header class="marquee">
        <span class="eyebrow">Ahora en cartelera</span>
        <h1>Películas</h1>
    </header>

    <section class="card">
        <h2>Registrar película</h2>
        <p class="section-hint">Completa la ficha técnica para agregarla al catálogo.</p>

        <form id="formulario">

            <label for="numeroControl">Número de control</label>
            <input
                type="text"
                id="numeroControl"
                placeholder="Ej. 21120345"
                required
            >

            <label for="titulo">Título</label>
            <input
                type="text"
                id="titulo"
                placeholder="Ej. Ciudad de estrellas"
                required
            >

            <label for="genero">Género</label>
            <input
                type="text"
                id="genero"
                placeholder="Ej. Drama, Ciencia ficción"
                required
            >

            <div class="row">
                <div>
                    <label for="año">Año</label>
                    <input
                        type="number"
                        id="año"
                        placeholder="2024"
                        required
                    >
                </div>
                <div>
                    <label for="duracion">Duración (min)</label>
                    <input
                        type="number"
                        id="duracion"
                        placeholder="120"
                        required
                    >
                </div>
            </div>

            <div class="row">
                <div>
                    <label for="idioma">Idioma</label>
                    <input
                        type="text"
                        id="idioma"
                        placeholder="Español"
                        required
                    >
                </div>
                <div>
                    <label for="calificacion">Calificación</label>
                    <input
                        type="number"
                        id="calificacion"
                        placeholder="0 – 10"
                        min="0"
                        max="10"
                        step="0.1"
                        required
                    >
                </div>
            </div>

            <button type="submit">
                Guardar película
            </button>

        </form>
    </section>

    <section class="card">
        <h2>Catálogo</h2>
        <p class="section-hint">Consulta las películas registradas en la API.</p>

        <button id="btnConsultar">
            Consultar películas
        </button>

        <ul id="listaPeliculas"></ul>
    </section>

    <script src="api.js"></script>
    <script src="app.js"></script>

</body>

</html>
